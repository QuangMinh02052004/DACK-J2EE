<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lỗi - VietTicket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="text-center py-5">
        <div style="font-size: 5rem;"><i class="bi bi-exclamation-triangle text-danger"></i></div>
        <h1 class="display-1 fw-bold text-danger" th:text="${status}">500</h1>
        <h3 class="mb-3">Đã xảy ra lỗi!</h3>
        <p class="text-muted mb-4" th:text="${message}">Có lỗi xảy ra trong quá trình xử lý yêu cầu.</p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="/" class="btn btn-primary btn-lg">
                <i class="bi bi-house-door"></i> Về trang chủ
            </a>
            <a href="/flights/list" class="btn btn-outline-primary btn-lg">
                <i class="bi bi-airplane"></i> Xem chuyến bay
            </a>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">&copy; 2025 VietTicket</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
